<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 | Page Not Found</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1f4037, #99f2c8);
        }

        .error-box {
            background: #ffffff;
            padding: 50px 60px;
            border-radius: 14px;
            text-align: center;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
            max-width: 420px;
            width: 100%;
        }

        .error-code {
            font-size: 80px;
            font-weight: bold;
            color: #e74c3c;
            margin-bottom: 10px;
        }

        .error-title {
            font-size: 24px;
            color: #333;
            margin-bottom: 12px;
        }

        .error-desc {
            font-size: 15px;
            color: #666;
            margin-bottom: 28px;
        }

        .error-box a {
            display: inline-block;
            padding: 12px 26px;
            background: #1f4037;
            color: #ffffff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            transition: background 0.3s ease;
        }

        .error-box a:hover {
            background: #16352e;
        }
    </style>
</head>
<body>

    <div class="error-box">
        <div class="error-code">404</div>
        <div class="error-title">Page Not Found</div>
        <div class="error-desc">
            Oops! The page you’re looking for doesn’t exist or was moved.
        </div>

        <!-- Change 'home' according to your URL name -->
        <a href="{% url 'home' %}">Go Back Home</a>
    </div>

</body>
</html>
